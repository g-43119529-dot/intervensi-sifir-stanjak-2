<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuiz Sifir Interaktif - Airforce Edition</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
</head>
<body data-template-id="__page-root" class="w-full">
  
  <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>
  
  <button id="sound-toggle" class="fixed top-4 right-4 z-50 bg-white/10 backdrop-blur rounded-full w-10 h-10 flex items-center justify-center text-cyan-300 hover:bg-white/20" onclick="toggleSound()">🔊</button> 

  <div id="login-screen" class="screen z-30 overflow-y-auto">
    <div class="max-w-md w-full glass rounded-2xl p-6 md:p-8 text-center fade-in shadow-2xl border border-cyan-500/30">
      <div class="text-6xl mb-3 float">🚀</div>
      <h1 class="text-3xl font-black neon-glow text-cyan-400 mb-1 tracking-wider">AKADEMI MISI SIFIR</h1>
      <p class="text-sm text-white/70 mb-6">Log masuk sebelum bermain</p>
      
      <div id="login-error-msg" class="hidden w-full bg-red-500/20 border border-red-500/50 text-red-200 text-sm py-2 px-3 rounded-xl mb-4 text-left font-medium shake">
        Ralat dipaparkan di sini.
      </div>

      <div class="mb-4 text-left">
        <label class="block text-sm font-medium text-blue-300 mb-1">PILIH KELAS</label>
        <select id="login-class-select" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Memuatkan kelas... --</option>
        </select>
      </div>

      <div class="mb-4 text-left">
        <label class="block text-sm font-medium text-blue-300 mb-1">PILIH NAMA</label>
        <select id="login-student-select" disabled class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50">
            <option value="">-- Pilih Kelas Dahulu --</option>
        </select>
      </div>

      <div class="mb-6 text-left">
        <label class="block text-xs font-bold text-cyan-300 uppercase tracking-wider mb-1">Kata Laluan (Password ID Delima)</label>
        <div class="relative rounded-xl shadow-sm">
          <input 
            id="login-password-input" 
            type="password" 
            placeholder="••••••••" 
            class="w-full bg-slate-900/80 border border-cyan-500/30 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 pr-10 transition-all"
          >
          <button 
            type="button" 
            id="toggle-password-btn" 
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-cyan-500 hover:text-cyan-300 focus:outline-none"
            onclick="togglePasswordVisibility()"
          >
            <svg id="eye-icon-open" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg id="eye-icon-close" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.4M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 21l-18-18" />
            </svg>
          </button>
        </div>
      </div>

      <button id="login-submit-btn" class="btn-neon w-full py-4 mt-2 rounded-xl text-lg font-bold text-white transition-all flex items-center justify-center gap-2">
        <span>MASUK BERMAIN</span>
        <div id="login-spinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full spinner"></div>
      </button>
    </div>
  </div>
  
  <div id="start-screen" class="screen hidden z-10 overflow-y-auto py-8">
    <div class="text-center max-w-lg w-full px-4">
      <h1 data-template-id="main-title" class="canva-text text-4xl md:text-5xl font-black neon-glow mb-2 text-cyan-400">SIFIR AIRFORCE</h1>
      <p id="welcome-user-text" class="text-sm text-cyan-200 mb-6 font-medium bg-cyan-950/40 py-1 px-4 rounded-full inline-block border border-cyan-800/40">Selamat Datang</p>
      
      <div class="flex flex-col gap-3 items-center mb-8">
        <button data-template-id="start-btn" class="canva-button btn-neon px-10 py-4 rounded-xl text-xl font-bold w-full max-w-xs" onclick="startGame()">Mula Bermain</button> 
        <button class="px-6 py-2 rounded-lg font-medium text-sm text-red-400 bg-red-950/20 border border-red-900/40 hover:bg-red-900/30 transition-all w-full max-w-xs" onclick="logoutKeLogin()">Log Keluar</button>
      </div>

      <div class="w-full bg-slate-900/80 backdrop-blur-md rounded-2xl p-5 border border-cyan-500/30 shadow-2xl text-left fade-in">
        <div class="flex items-center justify-between mb-3 border-b border-cyan-500/20 pb-2">
          <h3 class="text-lg font-black text-cyan-400 tracking-wider flex items-center gap-2">
            <span>🏆</span> LEADERBOARD TERATAS
          </h3>
          <span class="text-xs font-bold text-cyan-300/60 uppercase tracking-widest">Top 5 Misi</span>
        </div>
        
        <div id="start-fame-list" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-1">
          <div class="text-xs text-white/50 text-center py-4">Memuatkan senarai pendahulu...</div>
        </div>
      </div>
      </div>
  </div>

  <div id="transition-screen" class="screen hidden z-20">
    <div class="text-center max-w-lg w-full pop-in">
      <p id="transition-emoji" class="text-6xl mb-4"></p>
      <h2 id="transition-title" class="text-3xl font-black neon-glow text-cyan-300 mb-2"></h2>
      <p id="transition-subtitle" class="text-lg text-white/80"></p>
    </div>
  </div>

  <div id="quiz-screen" class="screen hidden z-10">
    <div class="max-w-lg w-full">
      <div class="flex justify-between items-center mb-3">
        <span id="level-badge" class="px-3 py-1 rounded-full text-sm font-bold bg-cyan-500/20 text-cyan-300"></span> 
        <button class="px-3 py-1 rounded-lg text-sm font-medium bg-white/20 text-white" onclick="exitToStart()">Keluar</button>
      </div>
      <div class="w-full h-2 rounded-full bg-white/20 mb-2 overflow-hidden">
        <div id="timer-bar" class="timer-bar h-full rounded-full bg-green-400" style="width:100%"></div>
      </div>
      <p id="timer-text" class="text-right text-sm text-cyan-300 mb-3">30s</p>
      <div id="help-card" class="hidden glass rounded-xl p-3 mb-3 help-card">
        <p id="help-card-content" class="text-xs text-cyan-200 font-mono leading-relaxed"></p>
      </div>
      <div class="glass rounded-2xl p-6 mb-4 text-center">
        <p id="question-num" class="text-sm text-cyan-300 mb-2"></p>
        <h2 id="question-text" class="text-3xl font-black text-white neon-glow"></h2>
      </div>
      <div id="options" class="grid grid-cols-2 gap-3 mb-3"></div>
      <div class="flex justify-between text-sm text-cyan-200">
        <span id="score-display">Markah: 0/0</span> 
        <span id="progress-display"></span>
      </div>
    </div>
  </div>

  <div id="minigame-screen" class="screen hidden z-20">
    <canvas id="game-canvas" class="rounded-2xl"></canvas>
    <div id="game-hud" class="absolute top-4 left-4 right-4 flex justify-between items-center text-cyan-300 text-sm font-bold z-30">
      <span id="game-lives"></span> 
      <span id="game-level-hud"></span> 
      <span id="game-timer"></span> 
      <span id="game-score-hud"></span>
    </div>
    <button id="pause-btn" class="absolute top-14 left-1/2 -translate-x-1/2 z-30 bg-white/10 backdrop-blur rounded-full w-10 h-10 flex items-center justify-center text-cyan-300 hover:bg-white/20 text-lg">⏸</button>
    <div id="pause-overlay">
      <p class="text-white text-3xl font-black mb-4 neon-glow">⏸ JEDA</p>
      <button id="resume-btn" class="btn-neon px-8 py-3 rounded-xl text-white font-bold text-lg">Sambung</button>
    </div>
  </div>

  <div id="boss-screen" class="screen hidden z-20">
    <div class="text-center max-w-lg w-full">
      <div id="boss-robot" class="text-8xl mb-4 float">🤖</div>
      <p id="boss-text" class="text-xl text-white font-bold mb-6"></p>
      <div id="confetti-container" class="fixed inset-0 pointer-events-none overflow-hidden"></div>
    </div>
  </div>

  <div id="fame-screen" class="screen hidden z-10">
    <div class="text-center max-w-lg w-full">
      <h2 data-template-id="fame-title" class="canva-text text-3xl font-black neon-glow mb-4 text-cyan-400">🔥 TOP 20 HALL OF FAME 🔥</h2>
      <div class="glass rounded-xl p-4 max-h-72 overflow-y-auto mb-4 text-left border border-cyan-500/20">
        <div id="fame-list"></div>
      </div>
      <button data-template-id="back-home-btn" class="px-6 py-2 rounded-lg font-medium text-sm text-cyan-300 bg-cyan-950/40 border border-cyan-800/60 hover:bg-cyan-900/50 transition-all" onclick="exitToStart()">Kembali Ke Menu</button>
    </div>
  </div>

  <div id="feedback" class="hidden fixed inset-0 flex items-center justify-center bg-black/60 z-50">
    <div id="feedback-box" class="pop-in text-center p-8 rounded-2xl">
      <p id="feedback-text" class="text-4xl font-black"></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>     
  <script src="js/login.js"></script>   
  <script src="js/quiz.js"></script>
  <script src="js/minigame.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
